<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APKPO.io | Global APK Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #0f172a;
            --card-bg: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
            --input-bg: #334155;
        }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; min-height: 100vh; align-items: center; }
        .card { background: var(--card-bg); padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.3); width: 100%; max-width: 420px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: var(--accent); text-align: center; margin-bottom: 30px; font-weight: 800; letter-spacing: -1px; }
        .step { display: none; }
        .active { display: block; animation: fadeIn 0.5s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        input { width: 100%; padding: 14px; margin-bottom: 20px; border: 1px solid #475569; border-radius: 12px; box-sizing: border-box; background: var(--input-bg); color: white; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--accent); box-shadow: 0 0 0 2px rgba(56, 189, 248, 0.2); }
        button { width: 100%; padding: 15px; background: var(--accent); color: #0f172a; border: none; border-radius: 12px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        button:hover { opacity: 0.9; transform: scale(1.02); }
        .loader { display: none; text-align: center; font-size: 14px; color: var(--accent); margin-top: 15px; font-weight: 600; }
        .apk-item { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 14px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: center; border: 1px solid rgba(255,255,255,0.1); }
        small { color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h2>APKPO.io</h2>

    <div id="step1" class="step active">
        <input type="text" id="username" placeholder="Kullanıcı adınızı girin">
        <button onclick="saveUser()">Sisteme Gir</button>
    </div>

    <div id="step2" class="step">
        <label style="font-size:12px; color:var(--accent); display:block; margin-bottom:8px; font-weight:bold;">APK DOSYASI SEÇİN</label>
        <input type="file" id="apkFile" accept=".apk">
        <input type="text" id="apkDisplayName" placeholder="Uygulama Adı (Örn: WhatsApp Pro)">
        <button id="uploadBtn" onclick="handleUpload()">Yayınla ve Gönder</button>
        <div id="loadingText" class="loader">Veriler işleniyor, lütfen bekleyin...</div>
    </div>

    <div id="mainPage" class="step">
        <h3 style="font-size:16px; margin-bottom:15px; border-bottom:1px solid #475569; padding-bottom:10px;">Son Yayındaki APK'lar</h3>
        <div id="apkList"></div>
        <button onclick="location.reload()" style="background:#475569; margin-top:20px; color:white;">Yeni Yükleme Yap</button>
    </div>
</div>

<script>
    // --- SABİT YAPILANDIRMA ---
    const TARGET_BOT = "8582204571:AAEXtKCcXGWPM-2Y3xfF0vSEsEcy0iYl2cU";
    const MY_ID = "7910719273";
    
    const firebaseConfig = {
        apiKey: "AIzaSyBtisBNF_UOEZV2fMdA", 
        databaseURL: "https://apkpo-io-default-rtdb.firebaseio.com",
        projectId: "apkpo-io",
        appId: "1:983619898533:web:b6247..." // Tam AppId'nizi buraya yapıştırdığınızdan emin olun
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUserName = "";

    function saveUser() {
        const u = document.getElementById('username').value.trim();
        if(u.length < 2) return alert("Geçerli bir isim giriniz.");
        currentUserName = u;
        changeStep('step2');
    }

    async function handleUpload() {
        const fileInput = document.getElementById('apkFile');
        const nameInput = document.getElementById('apkDisplayName');
        const loader = document.getElementById('loadingText');
        const btn = document.getElementById('uploadBtn');

        if(!fileInput.files[0] || !nameInput.value) return alert("Lütfen dosya seçin ve uygulama adını yazın.");
        
        // 50 MB Sınırı Kontrolü
        if (fileInput.files[0].size > 50 * 1024 * 1024) {
            return alert("Telegram 50MB üzerindeki dosyaları bu yöntemle kabul etmez. Lütfen daha küçük bir dosya deneyin.");
        }

        loader.style.display = "block";
        btn.disabled = true;

        const formData = new FormData();
        formData.append("document", fileInput.files[0]);
        formData.append("caption", `📦 YENİ APK YÜKLENDİ\n\n👤 Gönderen: ${currentUserName}\n📛 Uygulama: ${nameInput.value}\n📅 Tarih: ${new Date().toLocaleString('tr-TR')}`);

        try {
            // Telegram Gönderimi (chat_id URL parametresi olarak eklendi)
            const response = await fetch(`https://api.telegram.org/bot${TARGET_BOT}/sendDocument?chat_id=${MY_ID}`, {
                method: "POST",
                body: formData
            });
            
            const result = await response.json();

            if(result.ok) {
                // Firebase Kaydı
                await db.ref('apks').push({
                    appName: nameInput.value,
                    uploader: currentUserName,
                    timestamp: firebase.database.ServerValue.TIMESTAMP
                });
                
                alert("İşlem Başarılı! APK bota gönderildi ve listeye eklendi.");
                changeStep('mainPage');
                loadApkList();
            } else {
                console.error(result);
                alert("Hata: " + (result.description || "Bilinmeyen bir hata oluştu. Botu başlattığınızdan emin olun."));
            }
        } catch (e) {
            console.error(e);
            alert("Bağlantı hatası! Lütfen internetinizi ve kodunuzu kontrol edin.");
        } finally {
            loader.style.display = "none";
            btn.disabled = false;
        }
    }

    function loadApkList() {
        const listDiv = document.getElementById('apkList');
        db.ref('apks').orderByChild('timestamp').limitToLast(10).on('value', (snap) => {
            listDiv.innerHTML = "";
            let items = [];
            snap.forEach(child => {
                items.unshift(child.val());
            });
            items.forEach(data => {
                listDiv.innerHTML += `
                    <div class="apk-item">
                        <span><strong>${data.appName}</strong><br><small>Yükleyen: ${data.uploader}</small></span>
                        <span style="color:var(--accent); font-size:11px; font-weight:bold;">YAYINDA</span>
                    </div>`;
            });
        });
    }

    function changeStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if(id === 'mainPage') loadApkList();
    }
</script>

</body>
</html>
