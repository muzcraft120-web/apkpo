<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APKPO.io | Global APK Hub</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        :root {
            --bg: #f4f7f6;
            --white: #ffffff;
            --accent: #0088cc;
            --text: #333;
        }
        body { font-family: -apple-system, sans-serif; background: var(--bg); color: var(--text); margin: 0; padding: 20px; display: flex; justify-content: center; }
        .card { background: var(--white); padding: 25px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); width: 100%; max-width: 400px; }
        h2 { color: var(--accent); text-align: center; margin-bottom: 25px; }
        .step { display: none; }
        .active { display: block; }
        input { width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 14px; background: var(--accent); color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
        .loader { display: none; text-align: center; font-size: 14px; color: #666; margin-top: 10px; }
        .apk-item { background: #f9f9f9; padding: 15px; border-radius: 12px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #eee; }
    </style>
</head>
<body>

<div class="card">
    <h2>APKPO.io</h2>

    <div id="step1" class="step active">
        <input type="text" id="username" placeholder="Kullanıcı adınız">
        <button onclick="saveUser()">Devam Et</button>
    </div>

    <div id="step2" class="step">
        <label style="font-size:13px; font-weight:bold;">APK Dosyası Seç</label>
        <input type="file" id="apkFile" accept=".apk">
        <input type="text" id="apkDisplayName" placeholder="Uygulama Adı">
        <button onclick="handleUpload()">Yayınla</button>
        <div id="loadingText" class="loader">Telegram'a iletiliyor...</div>
    </div>

    <div id="mainPage" class="step">
        <h3 style="font-size:16px;">Son Yüklenenler</h3>
        <div id="apkList"></div>
        <button onclick="location.reload()" style="background:#666; margin-top:20px;">Çıkış Yap</button>
    </div>
</div>

<script>
    // --- YAPILANDIRMA ---
    const TARGET_BOT = "8582204571:AAEXtKCcXGWPM-2Y3xfF0vSEsEcy0iYl2cU";
    const MY_ID = "7910719273";
    
    // BURAYI KENDİ FIREBASE BİLGİLERİNLE GÜNCELLE
    const firebaseConfig = {
        apiKey: "AIzaSyBtisBNF_UOEZV2fMdA", 
        databaseURL: "https://apkpo-io-default-rtdb.firebaseio.com",
        projectId: "apkpo-io",
        appId: "1:983619898533:web:b6247..."
    };

    firebase.initializeApp(firebaseConfig);
    const db = firebase.database();
    let currentUserName = "";

    // --- FONKSİYONLAR ---
    function saveUser() {
        const u = document.getElementById('username').value.trim();
        if(u.length < 3) return alert("Kullanıcı adı çok kısa.");
        currentUserName = u;
        changeStep('step2');
    }

    async function handleUpload() {
        const fileInput = document.getElementById('apkFile');
        const nameInput = document.getElementById('apkDisplayName');
        const loader = document.getElementById('loadingText');

        if(!fileInput.files[0] || !nameInput.value) return alert("Dosya ve isim gerekli.");
        
        loader.style.display = "block";

        // 1. Telegram'a Dosya Gönderimi
        const formData = new FormData();
        formData.append("chat_id", MY_ID);
        formData.append("document", fileInput.files[0]);
        formData.append("caption", `📦 APKPO Yüklemesi\n👤 Gönderen: ${currentUserName}\n📛 Uygulama: ${nameInput.value}`);

        try {
            const response = await fetch(`https://api.telegram.org/bot${TARGET_BOT}/sendDocument`, {
                method: "POST",
                body: formData
            });
            const result = await response.json();

            if(result.ok) {
                // 2. Başarılıysa Firebase'e Kaydet
                await db.ref('apks').push({
                    appName: nameInput.value,
                    uploader: currentUserName,
                    date: Date.now()
                });
                alert("Başarıyla yüklendi ve bota iletildi!");
                changeStep('mainPage');
                loadApkList();
            } else {
                alert("Telegram Hatası: Botu başlatmış olduğunuzdan emin olun.");
            }
        } catch (e) {
            alert("Sistem hatası oluştu.");
        } finally {
            loader.style.display = "none";
        }
    }

    function loadApkList() {
        const listDiv = document.getElementById('apkList');
        db.ref('apks').limitToLast(10).on('value', (snap) => {
            listDiv.innerHTML = "";
            snap.forEach(child => {
                const data = child.val();
                listDiv.innerHTML += `
                    <div class="apk-item">
                        <span><strong>${data.appName}</strong><br><small>${data.uploader}</small></span>
                        <span style="color:#27ae60; font-size:12px;">Aktif</span>
                    </div>`;
            });
        });
    }

    function changeStep(id) {
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(id).classList.add('active');
    }
</script>

</body>
</html>
